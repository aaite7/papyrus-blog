<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4ebe1"/>
      <stop offset="100%" style="stop-color:#fffef7"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Corner ornaments -->
  <path d="M0 0 L80 0 L80 5 L5 5 L5 80 L0 80 Z" fill="#D4AF37"/>
  <path d="M1200 0 L1120 0 L1120 5 L1195 5 L1195 80 L1200 80 Z" fill="#D4AF37"/>
  <path d="M0 630 L80 630 L80 625 L5 625 L5 550 L0 550 Z" fill="#D4AF37"/>
  <path d="M1200 630 L1120 630 L1120 625 L1195 625 L1195 550 L1200 550 Z" fill="#D4AF37"/>
  
  <!-- Decorative lines -->
  <line x1="50" y1="120" x2="1150" y2="120" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="510" x2="1150" y2="510" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  
  <!-- Title -->
  <text x="600" y="280" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="bold" fill="#8B0000" text-anchor="middle">Minimalist</text>
  
  <!-- Subtitle -->
  <text x="600" y="340" font-family="Caveat, cursive" font-size="48" fill="#D4AF37" text-anchor="middle">Ancient Wisdom, Modern Stories</text>
  
  <!-- Description -->
  <text x="600" y="420" font-family="Lora, serif" font-size="24" fill="#666" text-anchor="middle">一个受古代卷轴和手写稿启发的极简博客</text>
  <text x="600" y="460" font-family="Lora, serif" font-size="24" fill="#666" text-anchor="middle">在喧嚣的数字世界中，为您呈现一片宁静的阅读天地</text>
  
  <!-- Features -->
  <g transform="translate(600, 520)">
    <text font-family="Arial, sans-serif" font-size="20" fill="#D4AF37" text-anchor="middle">📖 深度阅读</text>
    <text x="200" font-family="Arial, sans-serif" font-size="20" fill="#D4AF37" text-anchor="middle">✍️ 原创内容</text>
    <text x="400" font-family="Arial, sans-serif" font-size="20" fill="#D4AF37" text-anchor="middle">🌙 暗黑模式</text>
    <text x="600" font-family="Arial, sans-serif" font-size="20" fill="#D4AF37" text-anchor="middle">📱 响应式</text>
  </g>
  
  <!-- Seal -->
  <g transform="translate(1050, 150) rotate(-15)">
    <circle r="40" fill="url(#gold)"/>
    <text x="0" y="15" font-family="Caveat, cursive" font-size="28" fill="white" text-anchor="middle" font-weight="bold">Blog</text>
  </g>
  
  <!-- Stars -->
  <text x="480" y="280" font-size="40" fill="#D4AF37">✦</text>
  <text x="740" y="280" font-size="40" fill="#D4AF37">✦</text>
</svg>
